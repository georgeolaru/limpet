<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 380" width="920" height="380" role="img" aria-label="Your Mac stays online through the day: at home on home Wi-Fi, on the go (on a bike, on a train, or in a cafe) over your phone's hotspot, and at the office on office Wi-Fi.">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 Z" fill="#0A42D3"/>
    </marker>
  </defs>

  <!-- card -->
  <rect x="2" y="2" width="916" height="376" rx="18" fill="#FBFCFE" stroke="#ECEFF4" stroke-width="2"/>

  <!-- zones -->
  <rect x="24"  y="48" width="196" height="280" rx="14" fill="#F4F7FF" stroke="#E1E8F7" stroke-width="1.5"/>
  <rect x="284" y="48" width="352" height="280" rx="14" fill="#F4F7FF" stroke="#E1E8F7" stroke-width="1.5"/>
  <rect x="700" y="48" width="196" height="280" rx="14" fill="#F4F7FF" stroke="#E1E8F7" stroke-width="1.5"/>

  <!-- ============ AT HOME (cx=122) ============ -->
  <polygon points="99,140 122,122 145,140" fill="#0A42D3"/>
  <rect x="105" y="140" width="34" height="28" rx="2" fill="#FFFFFF" stroke="#0A42D3" stroke-width="2.2"/>
  <rect x="117" y="152" width="10" height="16" rx="1" fill="#E7EEFF" stroke="#0A42D3" stroke-width="1.4"/>
  <g fill="none" stroke="#0A42D3" stroke-width="3" stroke-linecap="round">
    <path d="M115 210 Q122 200.9 129 210"/>
    <path d="M108 210 Q122 191.8 136 210"/>
    <path d="M101 210 Q122 182.7 143 210"/>
  </g>
  <circle cx="122" cy="210" r="2.6" fill="#0A42D3"/>
  <rect x="99"  y="222" width="46" height="24" rx="3" fill="#E7EEFF"/>
  <rect x="94"  y="219" width="56" height="30" rx="5" fill="#FFFFFF" stroke="#0A42D3" stroke-width="2.5"/>
  <rect x="84"  y="250" width="76" height="6"  rx="3" fill="#0A42D3"/>
  <rect x="74"  y="282" width="96" height="26" rx="13" fill="#E4F6EC"/>
  <circle cx="97" cy="295" r="3.2" fill="#1D9E6A"/>

  <!-- ============ ON THE GO (cx=460) ============ -->
  <!-- use-case: bike with a bag (cx=360) -->
  <circle cx="352" cy="138" r="7" fill="none" stroke="#0A42D3" stroke-width="2"/>
  <circle cx="372" cy="138" r="7" fill="none" stroke="#0A42D3" stroke-width="2"/>
  <path d="M352 138 L358 126 L364 138 M358 126 L372 138 M372 138 L369 127 L373 125" fill="none" stroke="#0A42D3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="345" y="127" width="11" height="9" rx="1.5" fill="#E7EEFF" stroke="#0A42D3" stroke-width="1.3"/>
  <!-- use-case: train (cx=460) -->
  <path d="M460 120 L460 114 M455 114 L465 114" fill="none" stroke="#0A42D3" stroke-width="1.6" stroke-linecap="round"/>
  <rect x="448" y="120" width="24" height="20" rx="5" fill="#FFFFFF" stroke="#0A42D3" stroke-width="2"/>
  <rect x="452" y="124" width="16" height="7" rx="1.5" fill="#E7EEFF"/>
  <circle cx="454" cy="142" r="2.2" fill="#0A42D3"/>
  <circle cx="466" cy="142" r="2.2" fill="#0A42D3"/>
  <!-- use-case: cafe (cx=560) -->
  <path d="M557 122 Q560 119 557 116 M563 122 Q566 119 563 116" fill="none" stroke="#9AA6BB" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M553 125 L567 125 L565 138 L555 138 Z" fill="#FFFFFF" stroke="#0A42D3" stroke-width="2" stroke-linejoin="round"/>
  <path d="M567 127 Q573 129 567 135" fill="none" stroke="#0A42D3" stroke-width="2" stroke-linecap="round"/>
  <line x1="551" y1="140" x2="569" y2="140" stroke="#0A42D3" stroke-width="2" stroke-linecap="round"/>
  <!-- funnel: any of the three -> your phone's hotspot -->
  <path d="M360 166 L360 170 M460 166 L460 170 M560 166 L560 170 M360 170 L560 170 M460 170 L460 184" fill="none" stroke="#4A6FE0" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- phone (hotspot) -->
  <rect x="450" y="186" width="20" height="23" rx="4" fill="#FFFFFF" stroke="#0A42D3" stroke-width="2.2"/>
  <rect x="453" y="189" width="14" height="15" rx="1.5" fill="#E7EEFF"/>
  <line x1="456" y1="206" x2="464" y2="206" stroke="#0A42D3" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M460 209 L460 217" stroke="#0A42D3" stroke-width="1.8" stroke-dasharray="2.5 3" stroke-linecap="round"/>
  <!-- laptop -->
  <rect x="437" y="222" width="46" height="24" rx="3" fill="#E7EEFF"/>
  <rect x="432" y="219" width="56" height="30" rx="5" fill="#FFFFFF" stroke="#0A42D3" stroke-width="2.5"/>
  <rect x="422" y="250" width="76" height="6"  rx="3" fill="#0A42D3"/>
  <rect x="412" y="282" width="96" height="26" rx="13" fill="#E4F6EC"/>
  <circle cx="435" cy="295" r="3.2" fill="#1D9E6A"/>

  <!-- ============ AT THE OFFICE (cx=798) ============ -->
  <rect x="781" y="124" width="34" height="44" rx="2" fill="#FFFFFF" stroke="#0A42D3" stroke-width="2.2"/>
  <g fill="#E7EEFF">
    <rect x="787" y="130" width="7" height="7"/>
    <rect x="802" y="130" width="7" height="7"/>
    <rect x="787" y="142" width="7" height="7"/>
    <rect x="802" y="142" width="7" height="7"/>
    <rect x="787" y="154" width="7" height="7"/>
    <rect x="802" y="154" width="7" height="7"/>
  </g>
  <g fill="none" stroke="#0A42D3" stroke-width="3" stroke-linecap="round">
    <path d="M791 210 Q798 200.9 805 210"/>
    <path d="M784 210 Q798 191.8 812 210"/>
    <path d="M777 210 Q798 182.7 819 210"/>
  </g>
  <circle cx="798" cy="210" r="2.6" fill="#0A42D3"/>
  <rect x="775" y="222" width="46" height="24" rx="3" fill="#E7EEFF"/>
  <rect x="770" y="219" width="56" height="30" rx="5" fill="#FFFFFF" stroke="#0A42D3" stroke-width="2.5"/>
  <rect x="760" y="250" width="76" height="6"  rx="3" fill="#0A42D3"/>
  <rect x="750" y="282" width="96" height="26" rx="13" fill="#E4F6EC"/>
  <circle cx="773" cy="295" r="3.2" fill="#1D9E6A"/>

  <!-- journey arrows -->
  <line x1="226" y1="234" x2="278" y2="234" stroke="#0A42D3" stroke-width="2.5" marker-end="url(#ah)"/>
  <line x1="642" y1="234" x2="694" y2="234" stroke="#0A42D3" stroke-width="2.5" marker-end="url(#ah)"/>

  <!-- text -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" text-anchor="middle">
    <text x="122" y="84"  font-size="15.5" font-weight="700" fill="#1B2330">At home</text>
    <text x="122" y="103" font-size="11.5" fill="#5B6577">Home Wi-Fi</text>
    <text x="126" y="299" font-size="12.5" font-weight="600" fill="#167E4E">Online</text>

    <text x="460" y="84"  font-size="15.5" font-weight="700" fill="#1B2330">On the go</text>
    <text x="460" y="103" font-size="11.5" fill="#5B6577">your phone's hotspot</text>
    <text x="360" y="158" font-size="10.5" fill="#5B6577">on a bike</text>
    <text x="460" y="158" font-size="10.5" fill="#5B6577">on a train</text>
    <text x="560" y="158" font-size="10.5" fill="#5B6577">in a cafe</text>
    <text x="464" y="299" font-size="12.5" font-weight="600" fill="#167E4E">Online</text>

    <text x="798" y="84"  font-size="15.5" font-weight="700" fill="#1B2330">At the office</text>
    <text x="798" y="103" font-size="11.5" fill="#5B6577">Office Wi-Fi</text>
    <text x="802" y="299" font-size="12.5" font-weight="600" fill="#167E4E">Online</text>

    <text x="252" y="218" font-size="11" fill="#5B6577">you leave</text>
    <text x="668" y="218" font-size="11" fill="#5B6577">you arrive</text>

    <text x="460" y="356" font-size="13" fill="#5B6577">Home Wi-Fi &#183; your phone's hotspot &#183; office Wi-Fi &#8212; your Mac stays online all day.</text>
  </g>
</svg>
