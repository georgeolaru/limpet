<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" width="920" height="420" role="img" aria-label="Your Mac stays online through the day: at home on home Wi-Fi, on the go (on a bike, on a train, or out with a stroller) over your phone's hotspot, and at the office on office Wi-Fi.">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 Z" fill="#0A42D3"/>
    </marker>
  </defs>

  <!-- card -->
  <rect x="2" y="2" width="916" height="416" rx="18" fill="#FBFCFE" stroke="#ECEFF4" stroke-width="2"/>

  <!-- zones -->
  <rect x="24"  y="48" width="196" height="334" rx="14" fill="#F4F7FF" stroke="#E1E8F7" stroke-width="1.5"/>
  <rect x="284" y="48" width="352" height="334" rx="14" fill="#F4F7FF" stroke="#E1E8F7" stroke-width="1.5"/>
  <rect x="700" y="48" width="196" height="334" rx="14" fill="#F4F7FF" stroke="#E1E8F7" stroke-width="1.5"/>

  <!-- ============ AT HOME (cx=122) ============ -->
  <polygon points="99,184 122,166 145,184" fill="#0A42D3"/>
  <rect x="105" y="184" width="34" height="30" rx="2" fill="#FFFFFF" stroke="#0A42D3" stroke-width="2.2"/>
  <rect x="117" y="198" width="10" height="16" rx="1" fill="#E7EEFF" stroke="#0A42D3" stroke-width="1.4"/>
  <!-- official wi-fi glyph (dot + concentric arcs) -->
  <g fill="none" stroke="#0A42D3" stroke-width="3" stroke-linecap="round">
    <path d="M117.27 252.30 A6 6 0 0 1 126.73 252.30"/>
    <path d="M113.33 249.22 A11 11 0 0 1 130.67 249.22"/>
    <path d="M109.39 246.14 A16 16 0 0 1 134.61 246.14"/>
  </g>
  <circle cx="122" cy="256" r="2.6" fill="#0A42D3"/>
  <rect x="99"  y="276" width="46" height="24" rx="3" fill="#E7EEFF"/>
  <rect x="94"  y="273" width="56" height="30" rx="5" fill="#FFFFFF" stroke="#0A42D3" stroke-width="2.5"/>
  <rect x="84"  y="304" width="76" height="6"  rx="3" fill="#0A42D3"/>
  <rect x="74"  y="342" width="96" height="26" rx="13" fill="#E4F6EC"/>
  <circle cx="97" cy="355" r="3.2" fill="#1D9E6A"/>

  <!-- ============ ON THE GO (cx=460) ============ -->
  <!-- context row (secondary): bike, train, stroller -->
  <circle cx="352" cy="134" r="6.5" fill="none" stroke="#5C7AE6" stroke-width="1.8"/>
  <circle cx="372" cy="134" r="6.5" fill="none" stroke="#5C7AE6" stroke-width="1.8"/>
  <path d="M352 134 L358 123 L364 134 M358 123 L372 134 M372 134 L369 124 L373 122" fill="none" stroke="#5C7AE6" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="345" y="123" width="11" height="9" rx="1.5" fill="#EAF0FE" stroke="#5C7AE6" stroke-width="1.2"/>
  <path d="M460 116 L460 111 M455 111 L465 111" fill="none" stroke="#5C7AE6" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="448" y="116" width="24" height="20" rx="5" fill="#FFFFFF" stroke="#5C7AE6" stroke-width="1.8"/>
  <rect x="452" y="120" width="16" height="7" rx="1.5" fill="#EAF0FE"/>
  <circle cx="454" cy="138" r="2" fill="#5C7AE6"/>
  <circle cx="466" cy="138" r="2" fill="#5C7AE6"/>
  <path d="M549 130 Q560 114 571 130 Z" fill="#FFFFFF" stroke="#5C7AE6" stroke-width="1.8" stroke-linejoin="round"/>
  <path d="M549 130 L544 119 M544 119 L548 117" fill="none" stroke="#5C7AE6" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M553 130 L553 133 M567 130 L567 133" stroke="#5C7AE6" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="553" cy="136" r="3.4" fill="none" stroke="#5C7AE6" stroke-width="1.8"/>
  <circle cx="567" cy="136" r="3.4" fill="none" stroke="#5C7AE6" stroke-width="1.8"/>
  <!-- funnel: any context -> your phone (all on the central axis) -->
  <path d="M360 170 L360 174 M460 170 L460 174 M560 170 L560 174 M360 174 L560 174 M460 174 L460 190" fill="none" stroke="#9DB0EC" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- PHONE (green = the live link) bridging where you are to your Mac -->
  <rect x="444" y="196" width="32" height="48" rx="7" fill="#FFFFFF" stroke="#1D9E6A" stroke-width="2.8"/>
  <rect x="448" y="200" width="24" height="40" rx="3" fill="#DCF2E6"/>
  <circle cx="460" cy="202.5" r="1.4" fill="#1D9E6A"/>
  <line x1="455" y1="240" x2="465" y2="240" stroke="#1D9E6A" stroke-width="2" stroke-linecap="round"/>
  <!-- hotspot: official wi-fi glyph (green), pointing down to the laptop -->
  <g fill="none" stroke="#1D9E6A" stroke-width="2.8" stroke-linecap="round">
    <path d="M455.27 249.70 A6 6 0 0 0 464.73 249.70"/>
    <path d="M451.33 252.78 A11 11 0 0 0 468.67 252.78"/>
    <path d="M447.39 255.86 A16 16 0 0 0 472.61 255.86"/>
  </g>
  <circle cx="460" cy="246" r="2.6" fill="#1D9E6A"/>
  <!-- laptop (online) -->
  <rect x="437" y="276" width="46" height="24" rx="3" fill="#E7EEFF"/>
  <rect x="432" y="273" width="56" height="30" rx="5" fill="#FFFFFF" stroke="#0A42D3" stroke-width="2.5"/>
  <rect x="422" y="304" width="76" height="6"  rx="3" fill="#0A42D3"/>
  <rect x="412" y="342" width="96" height="26" rx="13" fill="#E4F6EC"/>
  <circle cx="435" cy="355" r="3.2" fill="#1D9E6A"/>

  <!-- ============ AT THE OFFICE (cx=798) ============ -->
  <rect x="781" y="166" width="34" height="48" rx="2" fill="#FFFFFF" stroke="#0A42D3" stroke-width="2.2"/>
  <g fill="#E7EEFF">
    <rect x="787" y="174" width="7" height="7"/>
    <rect x="802" y="174" width="7" height="7"/>
    <rect x="787" y="186" width="7" height="7"/>
    <rect x="802" y="186" width="7" height="7"/>
    <rect x="787" y="198" width="7" height="7"/>
    <rect x="802" y="198" width="7" height="7"/>
  </g>
  <g fill="none" stroke="#0A42D3" stroke-width="3" stroke-linecap="round">
    <path d="M793.27 252.30 A6 6 0 0 1 802.73 252.30"/>
    <path d="M789.33 249.22 A11 11 0 0 1 806.67 249.22"/>
    <path d="M785.39 246.14 A16 16 0 0 1 810.61 246.14"/>
  </g>
  <circle cx="798" cy="256" r="2.6" fill="#0A42D3"/>
  <rect x="775" y="276" width="46" height="24" rx="3" fill="#E7EEFF"/>
  <rect x="770" y="273" width="56" height="30" rx="5" fill="#FFFFFF" stroke="#0A42D3" stroke-width="2.5"/>
  <rect x="760" y="304" width="76" height="6"  rx="3" fill="#0A42D3"/>
  <rect x="750" y="342" width="96" height="26" rx="13" fill="#E4F6EC"/>
  <circle cx="773" cy="355" r="3.2" fill="#1D9E6A"/>

  <!-- journey arrows -->
  <line x1="226" y1="288" x2="278" y2="288" stroke="#0A42D3" stroke-width="2.5" marker-end="url(#ah)"/>
  <line x1="642" y1="288" x2="694" y2="288" stroke="#0A42D3" stroke-width="2.5" marker-end="url(#ah)"/>

  <!-- text -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" text-anchor="middle">
    <text x="122" y="88"  font-size="15.5" font-weight="700" fill="#1B2330">At home</text>
    <text x="122" y="107" font-size="11.5" fill="#5B6577">Home Wi-Fi</text>
    <text x="126" y="359" font-size="12.5" font-weight="600" fill="#167E4E">Online</text>

    <text x="460" y="88"  font-size="15.5" font-weight="700" fill="#1B2330">On the go</text>
    <text x="460" y="107" font-size="11.5" fill="#5B6577">your phone's hotspot</text>
    <text x="360" y="156" font-size="10.5" fill="#6B7589">on a bike</text>
    <text x="460" y="156" font-size="10.5" fill="#6B7589">on a train</text>
    <text x="560" y="156" font-size="10.5" fill="#6B7589">with a stroller</text>
    <text x="464" y="359" font-size="12.5" font-weight="600" fill="#167E4E">Online</text>

    <text x="798" y="88"  font-size="15.5" font-weight="700" fill="#1B2330">At the office</text>
    <text x="798" y="107" font-size="11.5" fill="#5B6577">Office Wi-Fi</text>
    <text x="802" y="359" font-size="12.5" font-weight="600" fill="#167E4E">Online</text>

    <text x="252" y="272" font-size="11" fill="#5B6577">you leave</text>
    <text x="668" y="272" font-size="11" fill="#5B6577">you arrive</text>

    <text x="460" y="404" font-size="13" fill="#5B6577">Home Wi-Fi &#183; your phone's hotspot &#183; office Wi-Fi &#8212; your Mac stays online all day.</text>
  </g>
</svg>
